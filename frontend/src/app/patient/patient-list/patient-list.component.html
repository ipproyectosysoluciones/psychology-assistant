<div class="list-container">
  <mat-toolbar color="primary" class="list-toolbar">
    <h1>Gestionar Pacientes</h1>
    <span class="spacer"></span>
    <button mat-raised-button color="accent" (click)="onCreate()">
      <mat-icon>add</mat-icon>
      Nuevo Paciente
    </button>
  </mat-toolbar>

  @if (isLoading) {
    <div class="loading">
      <mat-spinner diameter="50"></mat-spinner>
      <p>Cargando pacientes...</p>
    </div>
  } @else {
    <div class="list-content">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Buscar pacientes</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ej: nombre, email..." />
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <div class="table-wrapper">
        <table mat-table [dataSource]="dataSource" matSort>
          <!-- First Name Column -->
          <ng-container matColumnDef="firstName">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
            <td mat-cell *matCellDef="let element">{{ element.firstName }}</td>
          </ng-container>

          <!-- Last Name Column -->
          <ng-container matColumnDef="lastName">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Apellido</th>
            <td mat-cell *matCellDef="let element">{{ element.lastName }}</td>
          </ng-container>

          <!-- Email Column -->
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>Correo</th>
            <td mat-cell *matCellDef="let element">{{ element.email }}</td>
          </ng-container>

          <!-- Phone Column -->
          <ng-container matColumnDef="phone">
            <th mat-header-cell *matHeaderCellDef>Teléfono</th>
            <td mat-cell *matCellDef="let element">{{ element.phone }}</td>
          </ng-container>

          <!-- Status Column -->
          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Estado</th>
            <td mat-cell *matCellDef="let element">
              <span [class.status-active]="element.status === 'active'" 
                    [class.status-paused]="element.status === 'paused'"
                    [class.status-inactive]="element.status === 'inactive'"
                    class="status-badge">
                {{ element.status }}
              </span>
            </td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Acciones</th>
            <td mat-cell *matCellDef="let element">
              <button mat-icon-button color="primary" (click)="onEdit(element.id)" matTooltip="Editar">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="onDelete(element.id)" matTooltip="Eliminar">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>

      <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
    </div>
  }
</div>
