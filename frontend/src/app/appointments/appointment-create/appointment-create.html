<h2 mat-dialog-title>Agendar Nueva Cita</h2>

<mat-dialog-content>
  <form (ngSubmit)="submit()" [formGroup]="form" class="appointment-form">
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Fecha</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="date" />
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
      <mat-error *ngIf="form.get('date')?.invalid && form.get('date')?.touched">
        La fecha es requerida
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Descripción de la Cita</mat-label>
      <mat-select formControlName="description">
        <mat-option *ngFor="let type of appointmentTypes" [value]="type.value">
          {{ type.label }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('description')?.invalid && form.get('description')?.touched">
        La descripción es requerida
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Duración (minutos)</mat-label>
      <input matInput type="number" formControlName="duration" min="15" max="180" />
      <mat-error *ngIf="form.get('duration')?.invalid && form.get('duration')?.touched">
        Duración debe estar entre 15 y 180 minutos
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Notas (opcional)</mat-label>
      <textarea matInput formControlName="notes" rows="4"></textarea>
    </mat-form-field>

    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>
    <div *ngIf="successMessage" class="success-message">
      {{ successMessage }}
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="submit()" [disabled]="form.invalid">
    Agendar Cita
  </button>
</mat-dialog-actions>
