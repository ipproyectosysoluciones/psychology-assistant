<div class="list-container">
  <mat-toolbar color="primary" class="list-toolbar">
    <h1>Gestionar Clínicas</h1>
    <span class="spacer"></span>
    <button mat-raised-button color="accent" (click)="onCreate()">
      <mat-icon>add</mat-icon>
      Nueva Clínica
    </button>
  </mat-toolbar>

  @if (isLoading) {
    <div class="loading">
      <mat-spinner diameter="50"></mat-spinner>
      <p>Cargando clínicas...</p>
    </div>
  } @else {
    <div class="list-content">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Buscar clínicas</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ej: nombre, ciudad..." />
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <div class="table-wrapper">
        <table mat-table [dataSource]="dataSource" matSort>
          <!-- Name Column -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
            <td mat-cell *matCellDef="let element">{{ element.name }}</td>
          </ng-container>

          <!-- Email Column -->
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Correo</th>
            <td mat-cell *matCellDef="let element">{{ element.email }}</td>
          </ng-container>

          <!-- Phone Column -->
          <ng-container matColumnDef="phone">
            <th mat-header-cell *matHeaderCellDef>Teléfono</th>
            <td mat-cell *matCellDef="let element">{{ element.phone }}</td>
          </ng-container>

          <!-- City Column -->
          <ng-container matColumnDef="city">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Ciudad</th>
            <td mat-cell *matCellDef="let element">{{ element.city }}</td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Acciones</th>
            <td mat-cell *matCellDef="let element">
              <button mat-icon-button color="primary" (click)="onEdit(element.id)" matTooltip="Editar">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="onDelete(element.id)" matTooltip="Eliminar">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>

      <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
    </div>
  }
</div>
