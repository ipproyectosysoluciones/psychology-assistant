<div class="container">
  <h2>Mi perfil</h2>
  <form (ngSubmit)="save()" [formGroup]="form">
    <div>
      <label for="name">Nombre</label>
      <input id="name" formControlName="name" type="text" />
    </div>
    <div>
      <label for="email">Email (no editable)</label>
      <input id="email" formControlName="email" type="email" readonly />
    </div>
    <button type="submit">Guardar cambios</button>
  </form>
  <p class="message" *ngIf="message">{{ message }}</p>
  <p class="error" *ngIf="error">{{ error }}</p>

  <!-- Danger Zone: Account Deactivation -->
  <section class="danger-zone">
    <h3>⚠️ Zona de peligro</h3>
    <p>Una vez que desactives tu cuenta, no podrás acceder a ella.</p>
    <form [formGroup]="deactivationForm">
      <div>
        <label for="deactivation-password">Confirma tu contraseña</label>
        <input
          id="deactivation-password"
          type="password"
          formControlName="password"
          placeholder="Enter your password"
        />
      </div>
      <button
        type="button"
        (click)="deactivateAccount()"
        class="btn-danger"
      >
        Desactivar cuenta
      </button>
    </form>
  </section>
</div>
