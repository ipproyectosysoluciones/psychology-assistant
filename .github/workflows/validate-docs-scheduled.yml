name: Documentation Validation

on:
  schedule:
    - cron: '0 14 */2 * *'
  workflow_dispatch:

jobs:
  validate-documentation:
    name: Validate Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20.x'

      - name: Validate Documentation
        id: validate
        run: bash scripts/validate-and-report.sh
        continue-on-error: true

      - name: Upload Validation Report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: validation-report-${{ github.run_id }}
          path: docs/validation-reports/
          retention-days: 30

      - name: Check Results
        if: always()
        run: |
          echo "Validation completed"
          ls -lah docs/validation-reports/ || echo "No reports generated"

      - name: Create Issue on Failure
        if: steps.validate.outcome == 'failure'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const reportsDir = 'docs/validation-reports';
            if (!fs.existsSync(reportsDir)) {
              console.log('Reports directory not found');
              return;
            }

            const files = fs.readdirSync(reportsDir)
              .filter(f => f.startsWith('validation_') && f.endsWith('.log'))
              .sort()
              .reverse();

            if (files.length === 0) {
              console.log('No validation reports found');
              return;
            }

            const reportFile = path.join(reportsDir, files[0]);
            let reportContent = '';
            try {
              reportContent = fs.readFileSync(reportFile, 'utf8');
            } catch (e) {
              console.log('Could not read report file');
              return;
            }

            let severity = 'CRITICAL';
            let labels = ['documentation', 'critical'];

            if (reportContent.includes('FAILED')) {
              if (reportContent.includes('critical_files') || reportContent.includes('bilingual')) {
                severity = 'CRITICAL';
                labels = ['documentation', 'critical'];
              } else if (reportContent.includes('structure') || reportContent.includes('version')) {
                severity = 'HIGH';
                labels = ['documentation', 'high'];
              } else {
                severity = 'MEDIUM';
                labels = ['documentation', 'medium'];
              }
            }

            const truncatedReport = reportContent.substring(0, 2000);
            const issueBody = 'Documentation Validation Failed\n\nSeverity: ' + severity + '\n\nReport:\n```\n' + truncatedReport + '\n```\n\nFull report: ' + files[0] + '\n\nGenerated by GitHub Actions';

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[AUTO] Documentation Validation Failed - ' + severity,
              body: issueBody,
              labels: labels
            });

      - name: Email Notification
        if: steps.validate.outcome == 'failure'
        run: |
          echo "Documentation validation failed"
          echo "Details available at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Success Notification
        if: steps.validate.outcome == 'success'
        run: |
          echo "Documentation validation passed successfully"
          echo "Date: $(date)"
