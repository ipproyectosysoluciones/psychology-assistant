name: Build & Docker

on:
  push:
    branches: [main, dev, development/frontend-refactor]
  pull_request:
    branches: [main, dev]
  workflow_call:

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: '10.33.0'
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate environment
        run: pnpm run validate:env 2>&1 || echo "⚠️  Environment validation (optional)"

      - name: Check build artifacts
        run: |
          echo "✅ Backend ready for production"
          du -sh node_modules
          echo "Backend production ready"

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: '10.33.0'
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production bundle
        run: pnpm build --configuration production

      - name: Check bundle size
        run: |
          SIZE=$(du -sh dist | cut -f1)
          echo "📦 Build Size: $SIZE"

          if [ -d dist ]; then
            echo "✅ Frontend build successful"
            find dist -type f -name "*.js" | wc -l | xargs echo "JS files:"
          else
            echo "❌ Build directory not found"
            exit 1
          fi

      - name: Validate build output
        run: |
          if [ -f dist/index.html ]; then
            echo "✅ index.html generated"
          fi

          if [ -f dist/main.*.js ]; then
            echo "✅ Main bundle generated"
          else
            echo "❌ Main bundle missing"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-dist
          path: ./frontend/dist
          retention-days: 3

  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to Docker Hub
        uses: docker/login-action@2f1322d8f4ba2ac2a6f6a6a5c8b5a6a5c8b5a6a5 # v3.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [ "$VERSION" == "$GITHUB_REF" ]; then
            VERSION=${GITHUB_SHA:0:8}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=ipproyectos/psychology-assistant-backend:${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and Push Backend Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.version.outputs.IMAGE_TAG }}
            ipproyectos/psychology-assistant-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image push
        run: |
          echo "✅ Backend Docker image pushed to Docker Hub"
          echo "   Image: ${{ steps.version.outputs.IMAGE_TAG }}"
          echo "   Latest: ipproyectos/psychology-assistant-backend:latest"

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, docker-build]
    if: always()

    steps:
      - name: Check build results
        run: |
          echo "📊 Build Summary"
          echo "================="

          if [ "${{ needs.build-backend.result }}" = "failure" ]; then
            echo "❌ Backend Build: FAILED"
            exit 1
          else
            echo "✅ Backend Build: SUCCESS"
          fi

          if [ "${{ needs.build-frontend.result }}" = "failure" ]; then
            echo "❌ Frontend Build: FAILED"
            exit 1
          else
            echo "✅ Frontend Build: SUCCESS"
          fi

          if [ "${{ needs.docker-build.result }}" = "failure" ]; then
            echo "⚠️  Docker Build: Issues (may skip on non-main)"
          else
            echo "✅ Docker Build: SUCCESS"
          fi

          echo "================="
          echo "✅ All builds completed successfully"
