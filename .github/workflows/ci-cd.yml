name: CI/CD Pipeline Orchestrator

on:
  push:
    branches: [main, development/frontend-refactor]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Coverage
    uses: ./.github/workflows/test.yml

  lint:
    name: Code Quality
    uses: ./.github/workflows/lint.yml

  build:
    name: Build & Artifacts
    needs: [test, lint]
    uses: ./.github/workflows/build.yml

  ci-status:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [test, lint, build]
    if: always()

    steps:
      - name: Determine CI status
        run: |
          echo "🔍 CI/CD Pipeline Status"
          echo "========================"

          TEST_STATUS="${{ needs.test.result }}"
          LINT_STATUS="${{ needs.lint.result }}"
          BUILD_STATUS="${{ needs.build.result }}"

          echo "Tests:        $TEST_STATUS"
          echo "Linting:      $LINT_STATUS"
          echo "Build:        $BUILD_STATUS"
          echo "========================"

          if [ "$TEST_STATUS" = "failure" ] || [ "$LINT_STATUS" = "failure" ] || [ "$BUILD_STATUS" = "failure" ]; then
            echo "❌ CI/CD Pipeline FAILED"
            exit 1
          fi

          echo "✅ CI/CD Pipeline PASSED"
          echo ""
          echo "Next steps:"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "- ✅ Ready for code review"
            echo "- ✅ All checks passed"
          else
            echo "- ✅ Merge to main successful"
            echo "- ✅ Ready for deployment"
          fi

  notify-success:
    name: Success Notification
    runs-on: ubuntu-latest
    needs: ci-status
    if: success()

    steps:
      - name: Pipeline Success
        run: |
          echo "✅ All CI/CD checks passed successfully!"
          echo ""
          echo "📊 Summary:"
          echo "- Tests: ✅ Passed"
          echo "- Linting: ✅ Passed"
          echo "- Build: ✅ Success"
          echo ""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR is ready for merge!"
          else
            echo "Changes are deployed and ready!"
          fi

  notify-failure:
    name: Failure Notification
    runs-on: ubuntu-latest
    needs: ci-status
    if: failure()

    steps:
      - name: Pipeline Failure
        run: |
          echo "❌ CI/CD Pipeline failed"
          echo ""
          echo "Please review:"
          echo "- Check test failures in 'Tests & Coverage'"
          echo "- Check linting errors in 'Code Quality'"
          echo "- Check build errors in 'Build & Artifacts'"
