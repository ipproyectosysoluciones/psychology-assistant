name: Lint & Type Check

on:
  push:
    branches: [main, development/frontend-refactor]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ESLint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Generate ESLint report
        if: always()
        run: |
          npm run lint 2>&1 | tee eslint-report.txt || true
          if grep -q "error" eslint-report.txt; then
            echo "❌ ESLint errors found"
            exit 1
          fi
          echo "✅ ESLint passed"

  type-check:
    name: TypeScript Type Checking
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler (Backend)
        run: npx tsc --noEmit src/**/*.js 2>&1 || true
        continue-on-error: true

      - name: Check TypeScript frontend
        working-directory: ./frontend
        run: npm run type-check 2>&1 || true
        continue-on-error: true

      - name: TSC validation
        run: |
          echo "✅ Type checking completed"

  prettier:
    name: Code Formatting (Prettier)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Prettier formatting
        run: npx prettier --check "src/**/*.{js,json}" "frontend/src/**/*.{ts,html,scss}" || true
        continue-on-error: true

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Run npm audit
        run: npm audit --audit-level=moderate --json > audit-report.json || true
        continue-on-error: true

      - name: Check for vulnerabilities
        run: |
          if grep -q '"critical"' audit-report.json || grep -q '"high"' audit-report.json; then
            echo "⚠️  Critical/High vulnerabilities found"
            cat audit-report.json
          else
            echo "✅ No critical vulnerabilities"
          fi

  quality-gate:
    name: Quality Gate Check
    runs-on: ubuntu-latest
    needs: [lint, type-check, prettier, security-audit]
    if: always()

    steps:
      - name: Check quality gates
        run: |
          echo "📊 Quality Check Summary"
          echo "========================"

          if [ "${{ needs.lint.result }}" = "failure" ]; then
            echo "❌ Linting: FAILED"
          else
            echo "✅ Linting: PASSED"
          fi

          if [ "${{ needs.type-check.result }}" = "failure" ]; then
            echo "⚠️  Type Check: Issues found"
          else
            echo "✅ Type Check: PASSED"
          fi

          if [ "${{ needs.prettier.result }}" = "failure" ]; then
            echo "⚠️  Code Formatting: Needs updates"
          else
            echo "✅ Code Formatting: PASSED"
          fi

          if [ "${{ needs.security-audit.result }}" = "failure" ]; then
            echo "⚠️  Security Audit: Issues found"
          else
            echo "✅ Security Audit: PASSED"
          fi

          # Summary
          echo "========================"
          if [ "${{ needs.lint.result }}" = "failure" ]; then
            echo "❌ Quality gates FAILED"
            exit 1
          fi
          echo "✅ Quality gates PASSED"
