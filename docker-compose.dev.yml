version: '3.8'

services:
  # Backend API Service
  app:
    image: ipproyectos/psychology-assistant-backend:0.5.0
    container_name: psychology-assistant-backend
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongodb:27017/psychology-assistant-dev
      - DATABASE_URL=mongodb://mongodb:27017/psychology-assistant-dev
      - JWT_SECRET=dev_jwt_secret_change_in_production
      - REFRESH_TOKEN_SECRET=dev_refresh_token_secret_change_in_production
      - SESSION_SECRET=dev_session_secret_change_in_production
      - PORT=5000
      - LOG_LEVEL=debug
      - CORS_ORIGIN=http://localhost:4200
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - ./logs:/app/logs
    networks:
      - psychology-dev-network
    command: pnpm run dev
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1024M
        reservations:
          cpus: '1'
          memory: 512M
    healthcheck:
      test: ['CMD', 'node', 'scripts/healthcheck.js']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Angular Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: psychology-assistant-frontend
    ports:
      - '4200:4200'
    environment:
      - NODE_ENV=development
      - API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - psychology-dev-network
    depends_on:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 384M
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'require("http").get("http://localhost:4200", (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})',
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    command: pnpm start

  # MongoDB Database Service
  mongodb:
    image: mongo:6.0
    container_name: psychology-assistant-mongodb-dev
    ports:
      - '27017:27017'
    environment:
      - MONGO_INITDB_DATABASE=psychology-assistant-dev
    volumes:
      - mongodb_dev_data:/data/db
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    networks:
      - psychology-dev-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongodb_dev_data:
    driver: local

networks:
  psychology-dev-network:
    driver: bridge
