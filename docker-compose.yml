version: '3.8'

services:
  # Backend API Service
  app:
    build: .
    container_name: psychology-assistant-api
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/psychology-assistant
      - JWT_SECRET=${JWT_SECRET?JWT_SECRET is required}
      - PORT=5000
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - LOG_LEVEL=info
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - psychology-network
    restart: always
    healthcheck:
      test: ['CMD', 'node', 'scripts/healthcheck.js']
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    security_opt:
      - no-new-privileges:true

  # MongoDB Database Service
  mongodb:
    image: mongo:6.0
    container_name: psychology-assistant-mongodb
    ports:
      - '27017:27017'
    environment:
      - MONGO_INITDB_DATABASE=psychology-assistant
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD?MONGO_ROOT_PASSWORD is required}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    networks:
      - psychology-network
    restart: always
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    security_opt:
      - no-new-privileges:true

  # Optional: Reverse Proxy/Load Balancer (nginx)
  # Uncomment to enable
  # nginx:
  #   image: nginx:alpine
  #   container_name: psychology-assistant-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - psychology-network
  #   restart: always

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  psychology-network:
    driver: bridge
